kind = "web"
previewPath = "/"
title = "Kingdom Adventures"
version = "1.0.0"
id = "artifacts/kingdom-adventures"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25312

[services.development]
run = "pnpm --filter @workspace/kingdom-adventures run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kingdom-adventures", "run", "build" ]
publicDir = "artifacts/kingdom-adventures/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25312"
BASE_PATH = "/"
